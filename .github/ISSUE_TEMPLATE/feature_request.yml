name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        The most useful requests describe the **problem** first. Tell us where
        you're stuck — the right fix often falls out of that.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What you have in mind
      description: A rough idea of the solution, if you have one. Optional.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: What you've tried or considered
    validations:
      required: false
